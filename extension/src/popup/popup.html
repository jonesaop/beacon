<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <div id="header">
    <h1>Beacon</h1>
    <p>Scam Detection Tool</p>
  </div>

  <!--
    "Check this page" button — Tier 2 deep analysis (API call).
    Starts disabled. popup.ts enables it only when the heuristic score >= 4.
  -->
  <button id="scan-button" disabled>Check this page</button>

  <!-- Results area — hidden until popup.ts receives a result from background -->
  <div id="results" class="hidden">

    <!-- Score circle + verdict on the same row -->
    <div id="score-section">
      <div id="score-circle">
        <span id="score-number">0</span>
        <span id="score-label">/ 10</span>
      </div>
      <div id="verdict-section">
        <p id="verdict-text">safe</p>
        <p id="verdict-url"></p>
      </div>
    </div>

    <!-- Plain-language explanation -->
    <div id="explanation-section">
      <p id="explanation-text"></p>
    </div>

    <!--
      Findings list — hidden when there are no findings (safe pages).
      popup.ts populates this with <li> elements from result.findings[].
    -->
    <div id="findings-section" class="hidden">
      <h3>Findings</h3>
      <ul id="findings-list"></ul>
    </div>

  </div>

  <!-- Error area — hidden until something goes wrong -->
  <div id="error" class="hidden">
    <p id="error-message"></p>
  </div>

  <!-- Load the compiled TypeScript (bundled by Vite into popup.js) -->
  <script src="popup.js"></script>
</body>
</html>
